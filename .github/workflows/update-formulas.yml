---
name: Update Homebrew Formulas
"on":
  workflow_dispatch:
    inputs:
      version:
        description: New version (without v prefix)
        required: true
        type: string
permissions:
  contents: write
concurrency:
  group: update-formulas
jobs:
  update:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump Homebrew formulas
        run: |
          brew tap rubykatzen/tap "$(pwd)"
          brew bump-formula-pr --write-only --no-browse \
            --version ${{ inputs.version }} rubykatzen/tap/releaser
      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No formula updates to push."
          else
            git add Formula/*.rb
            git commit -m "releaser: update to v${{ inputs.version }}"
            git push
          fi
