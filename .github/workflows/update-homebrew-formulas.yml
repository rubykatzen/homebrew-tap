---
name: Update Homebrew Formulas
"on":
  workflow_dispatch:
    inputs:
      formula:
        description: Formula to update
        required: true
        type: choice
        options:
          - releaser
          - embedder
      version:
        description: New version without v prefix
        required: true
        type: string
permissions:
  contents: write
concurrency:
  group: update-homebrew-formulas-${{ inputs.formula }}
jobs:
  releaser:
    if: inputs.formula == 'releaser'
    uses: rubykatzen/releaser/.github/workflows/update-homebrew-formulas-shared.yml@v0.3.5
    with:
      formula: releaser
      repository: rubykatzen/releaser
      version: ${{ inputs.version }}
      class-name: Releaser
      description: Opinionated zero-config release gate for GitHub repositories
      test-match: releaser
  embedder:
    if: inputs.formula == 'embedder'
    uses: rubykatzen/releaser/.github/workflows/update-homebrew-formulas-shared.yml@v0.3.5
    with:
      formula: embedder
      repository: rubykatzen/embedder
      version: ${{ inputs.version }}
      class-name: Embedder
      description: Dependency-style updater for embedded text snippets
      test-match: embedder
