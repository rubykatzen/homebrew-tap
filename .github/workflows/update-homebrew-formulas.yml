---
name: Update Homebrew Formulas
"on":
  workflow_dispatch:
    inputs:
      repository:
        description: Released repository, e.g. rubykatzen/releaser
        required: true
        type: string
      formula:
        description: Formula name override
        required: false
        type: string
permissions:
  contents: write
concurrency:
  group: update-homebrew-formula-${{ inputs.repository }}
  cancel-in-progress: false
jobs:
  update:
    uses: rubykatzen/releaser/.github/workflows/update-homebrew-formulas-shared.yml@v0.4.1
    with:
      repository: ${{ inputs.repository }}
      formula: ${{ inputs.formula }}
      tap: rubykatzen/tap
