name: Update Formulas
"on":
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  actions: write
concurrency:
  group: update-homebrew-formulas
  cancel-in-progress: false
jobs:
  update:
    uses: rubykatzen/releaser/.github/workflows/update-homebrew-formulas-shared.yml@feat/update-homebrew-pr-options
    with:
      auto_merge: true
      post_push_workflows: lint.yml
