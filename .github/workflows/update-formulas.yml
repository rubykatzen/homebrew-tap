---
name: Update Homebrew Formulas
"on":
  workflow_dispatch:
    inputs:
      version:
        description: New version (without v prefix)
        required: true
        type: string
      project:
        description: Project/formula to update
        required: false
        default: releaser
        type: choice
        options:
          - releaser
          - embedder
permissions:
  contents: write
concurrency:
  group: update-formulas
jobs:
  update:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump Homebrew formulas
        run: |
          PROJECT=${{ inputs.project }}
          VERSION=${{ inputs.version }}
          case "$PROJECT" in
            releaser)
              CLASS_NAME="Releaser"
              DESC="Opinionated zero-config release gate for GitHub repositories"
              TEST_MATCH="releaser"
              ;;
            embedder)
              CLASS_NAME="Embedder"
              DESC="Dependency-style updater for embedded text snippets"
              TEST_MATCH="embedder"
              ;;
            *)
              echo "Unsupported project: $PROJECT" >&2
              exit 1
              ;;
          esac
          URL="https://github.com/rubykatzen/${PROJECT}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          cat > "Formula/${PROJECT}.rb" <<EOF
          class ${CLASS_NAME} < Formula
            include Language::Python::Virtualenv
            desc "${DESC}"
            homepage "https://github.com/rubykatzen/${PROJECT}"
            url "${URL}"
            sha256 "${SHA256}"
            license "MIT"
            livecheck do
              url :stable
              regex(/^v?(\\d+(?:\\.\\d+)+)$/i)
            end
            depends_on "gh"
            depends_on "git"
            depends_on "python@3.13"
            def install
              virtualenv_install_with_resources
            end
            test do
              assert_match "${TEST_MATCH}", shell_output("#{bin}/${PROJECT} --help")
            end
          end
          EOF
      - name: Commit and push changes
        run: |
          git add Formula/*.rb
          if git diff --cached --quiet; then
            echo "No formula updates to push."
          else
            git commit -m "${{ inputs.project }}: update to v${{ inputs.version }}"
            git push
          fi
