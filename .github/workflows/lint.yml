name: Lint
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rubykatzen/baseline/.github/actions/lint-yamllint@v0.5.1
      - uses: rubykatzen/baseline/.github/actions/lint-pymarkdown@v0.5.1
      - uses: rubykatzen/baseline/.github/actions/lint-actionlint@v0.5.1
