---
name: Update Homebrew Formulas
"on":
  workflow_dispatch:
    inputs:
      version:
        description: New version (without v prefix)
        required: true
        type: string
permissions:
  contents: write
concurrency:
  group: update-formulas
jobs:
  update:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump Homebrew formulas
        run: |
          VERSION=${{ inputs.version }}
          URL="https://github.com/rubykatzen/releaser/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          sed -i '' "s|url \".*\"|url \"${URL}\"|" Formula/releaser.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/releaser.rb
      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No formula updates to push."
          else
            git add Formula/*.rb
            git commit -m "releaser: update to v${{ inputs.version }}"
            git push
          fi
